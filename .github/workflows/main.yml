name: Free RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download and install ngrok
      run: |
        Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
        Expand-Archive -Path "ngrok.zip" -DestinationPath ".\ngrok" -Force
        Remove-Item "ngrok.zip"

    - name: Configure ngrok with token
      run: |
        .\ngrok\ngrok.exe authtoken $env:NGROK_AUTH_TOKEN
      env:
        NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}

    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0

    - name: Set password for runneradmin
      run: |
        $Password = ConvertTo-SecureString -String "P@ssw0rd123!" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password

    - name: Start ngrok tunnel for RDP
      run: |
        Start-Process -FilePath ".\ngrok\ngrok.exe" -ArgumentList "tcp 3389" -NoNewWindow

    - name: Get ngrok public URL (with retry)
      run: |
        $maxRetries = 30
        $retryCount = 0
        $tunnelUrl = $null

        while ($retryCount -lt $maxRetries -and -not $tunnelUrl) {
            try {
                $response = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels" -ErrorAction Stop
                $tunnel = $response.tunnels | Where-Object { $_.proto -eq "tcp" }
                if ($tunnel) {
                    $tunnelUrl = $tunnel.public_url
                    Write-Output "✅ RDP tunnel URL: $tunnelUrl"
                } else {
                    Write-Output "⏳ Tunnel TCP belum tersedia, menunggu... (percobaan $($retryCount+1))"
                }
            } catch {
                Write-Output "⏳ Ngrok API belum siap, menunggu... (percobaan $($retryCount+1))"
            }
            
            if (-not $tunnelUrl) {
                Start-Sleep -Seconds 5
                $retryCount++
            }
        }

        if (-not $tunnelUrl) {
            Write-Error "❌ Gagal mendapatkan URL ngrok setelah $maxRetries percobaan."
            exit 1
        }

        Write-Output "🔑 Username: runneradmin"
        Write-Output "🔑 Password: P@ssw0rd123!"
        Write-Output ""
        Write-Output "🚀 Gunakan informasi di atas untuk mengakses RDP via client RDP atau browser."

    - name: Keep workflow alive (max 6 hours)
      run: |
        Write-Output "✅ RDP siap digunakan. Workflow akan berjalan selama 6 jam."
        Start-Sleep -Seconds 21600   # 6 jam
